<style>
/* ===================== DESIGN TOKENS ===================== */
:root{
  --accent:#5B8C5A;            /* matcha green */
  --accent-d:#4a734a;
  --amber:#E0A106;
  --red:#D64545;
  --bg:#f5f6f4;
  --surface:#ffffff;
  --surface-2:#eef0ec;
  --text:#1d2120;
  --text-dim:#5c625f;
  --border:#e0e3df;
  --shadow:0 2px 10px rgba(0,0,0,.08);
  --radius:16px;
  --tab-h:64px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#15171a;
    --surface:#1f2226;
    --surface-2:#282c31;
    --text:#eef0ec;
    --text-dim:#9aa19d;
    --border:#33383d;
    --shadow:0 2px 12px rgba(0,0,0,.4);
    --accent:#6fa86d;
    --accent-d:#5b8c5a;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  font-size:17px;
  line-height:1.4;
  color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  padding-top:var(--safe-t);
}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:17px}
h1,h2,h3{margin:0}

/* ===================== LAYOUT ===================== */
#app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 12px)}
.view{display:none;padding:18px 16px 8px}
.view.active{display:block;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.screen-title{font-size:1.5rem;font-weight:700;margin-bottom:14px}

/* offline banner */
#banner{display:none;background:var(--red);color:#fff;padding:10px 14px;font-size:.9rem;text-align:center}
#banner.show{display:block}

/* ===================== BOTTOM TABS ===================== */
#tabs{
  position:fixed;left:0;right:0;bottom:0;

  background:var(--surface);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-b);

}
.tab{
  flex:1;min-height:var(--tab-h);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--text-dim);font-size:.7rem;font-weight:600;

}
.tab .ic{font-size:1.45rem;line-height:1}
.tab.active{color:var(--accent)}
.tab.active .ic{transform:scale(1.08)}

/* ===================== CARDS ===================== */
.card{
  background:var(--surface);border-radius:var(--radius);

}

/* ===================== DASHBOARD RING ===================== */

.ring-svg{transform:rotate(-90deg)}
.ring-bg{stroke:var(--surface-2)}
.ring-fg{transition:stroke-dashoffset .6s ease, stroke .3s ease;stroke-linecap:round}
.ring-center{position:absolute;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-center .big{font-size:2.1rem;font-weight:800;letter-spacing:-.5px}

.ring-holder{position:relative;display:flex;align-items:center;justify-content:center}

.field{margin-bottom:16px}

}

.cat-manage input.cn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);

.cat-manage .del{color:var(--red);font-size:1.3rem;padding:8px;min-width:44px;min-height:44px}
.swatches{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 4px 40px}
.sw{width:30px;height:30px;border-radius:50%;border:3px solid transparent}
.sw[aria-pressed="true"]{border-color:var(--text)}
.btn-sec{width:100%;min-height:48px;border-radius:12px;background:var(--surface-2);
  font-weight:600;margin-top:8px}
.btn-danger{background:#fbe3e3;color:var(--red)}
@media (prefers-color-scheme:dark){.btn-danger{background:#3a1f1f}}
.arch-note{font-size:.78rem;color:var(--text-dim);margin:-4px 0 10px 40px}

/* ===================== TOAST ===================== */
#toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(20px);
  bottom:calc(var(--tab-h) + var(--safe-b) + 16px);
  background:var(--text);color:var(--bg);padding:12px 18px;border-radius:12px;
  font-weight:600;font-size:.95rem;opacity:0;pointer-events:none;transition:.25s;z-index:100;
  max-width:90%;box-shadow:0 4px 20px rgba(0,0,0,.3);
}

/* ===================== EDIT SHEET (modal) ===================== */
#sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:90;
  align-items:flex-end;justify-content:center;
}
#sheet-overlay.show{display:flex;animation:fade .2s}
.sheet{
  background:var(--surface);width:100%;max-width:520px;border-radius:20px 20px 0 0;
  padding:20px 18px calc(20px + var(--safe-b));box-shadow:0 -4px 24px rgba(0,0,0,.2);
  animation:slideup .25s ease;

@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{margin-bottom:14px;font-size:1.2rem}
.sheet .row2{display:flex;gap:10px;margin-top:14px}
.sheet .row2 button{flex:1}
.hint{font-size:.85rem;color:var(--text-dim);text-align:center;margin-top:4px}

<script>
"use strict";
/* =========================================================================
   Weekly Budget Tracker — single-file PWA
   Money is stored as INTEGER centavos to avoid floating point drift.
   Formatting happens only at render time.
   ========================================================================= */

const STORAGE_KEY = "rmc.budget.v1";

/* ---------- constants ---------- */
const MAX_CENTAVOS = 999999999;           // ₱9,999,999.99 cap
const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const COLOR_PRESETS = ["#5B8C5A","#3A7CA5","#8B5E34","#9B5DE5","#F15BB5","#888888",
                       "#E0A106","#D64545","#2A9D8F","#E76F51","#264653","#6D597A"];

/* =========================================================================
   ID generation
   ========================================================================= */
function newId(){
  return "t_" + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

/* =========================================================================
   STATE: defaults / storage probe / load / save / migrate
   ========================================================================= */
function defaultState(){
  const now = Date.now();
  return {
    version:1,
    settings:{
      weeklyAllowance:100000,           // ₱1000
      currencySymbol:"₱",
      weekStartDay:1,                   // Monday
      categories:[
        {id:"c_food",     name:"Food",      color:"#5B8C5A", icon:"🍜"},
        {id:"c_transport",name:"Transport", color:"#3A7CA5", icon:"🚌"},
        {id:"c_coffee",   name:"Coffee",    color:"#8B5E34", icon:"☕"},
        {id:"c_school",   name:"School",    color:"#9B5DE5", icon:"📚"},
        {id:"c_fun",      name:"Fun",       color:"#F15BB5", icon:"🎮"},
        {id:"c_other",    name:"Other",     color:"#888888", icon:"💸"}
      ]
    },
    transactions:[],
    meta:{createdAt:now,lastOpenedAt:now}
  };
}

/* Probe whether localStorage is actually usable (Safari private mode etc.) */
function storageAvailable(){
  try{
    const k="__probe__"+Math.random();
    localStorage.setItem(k,"1");
    localStorage.removeItem(k);
    return true;
  }catch(e){ return false; }
}

/* Migrate older shapes up to current version (forward-compatible scaffold). */
function migrate(state){
  if(!state || typeof state!=="object") return defaultState();
  if(typeof state.version!=="number") state.version=1;
  // Defensive shape repair
  const d = defaultState();
  if(!state.settings || typeof state.settings!=="object") state.settings=d.settings;
  if(!Array.isArray(state.settings.categories) || state.settings.categories.length===0)
    state.settings.categories = d.settings.categories;
  if(typeof state.settings.weeklyAllowance!=="number" || isNaN(state.settings.weeklyAllowance) || state.settings.weeklyAllowance<0)
    state.settings.weeklyAllowance = d.settings.weeklyAllowance;   // fall back to default, not 0
  if(!state.settings.currencySymbol) state.settings.currencySymbol="₱";
  if(typeof state.settings.weekStartDay!=="number") state.settings.weekStartDay=1;
  if(!Array.isArray(state.transactions)) state.transactions=[];
  if(!state.meta || typeof state.meta!=="object")
    state.meta={createdAt:Date.now(),lastOpenedAt:Date.now()};
  state.version=1;
  return state;
}

let STORAGE_OK = true;   // becomes false in in-memory mode
let STATE = null;

function loadState(){
  if(!storageAvailable()){
    STORAGE_OK=false;
    return defaultState();
  }
  STORAGE_OK=true;
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();          // first run
    const parsed = JSON.parse(raw);
    return migrate(parsed);
  }catch(e){
    // Corrupt JSON -> fall back cleanly
    console.warn("Corrupt state, resetting:",e);
    return defaultState();
  }
}

/* Returns true on success, false on failure (quota / unavailable). */
function saveState(){
  if(!STORAGE_OK) return false;            // in-memory mode: skip silently
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
    return true;
  }catch(e){
    if(e && (e.name==="QuotaExceededError" || e.code===22)){
      showToast("Storage full — couldn't save.");
    }else{
      showToast("Couldn't save changes.");
    }
    return false;
  }
}

/* =========================================================================
   WEEK LOGIC — DST-safe via Date.setDate arithmetic, all in LOCAL time
   ========================================================================= */
function getCurrentWeekRange(now, weekStartDay){
  const d = new Date(now);
  d.setHours(0,0,0,0);                              // local midnight today
  const delta = (d.getDay() - weekStartDay + 7) % 7;
  const start = new Date(d);
  start.setDate(d.getDate() - delta);              // back to week start
  start.setHours(0,0,0,0);
  const end = new Date(start);
  end.setDate(start.getDate() + 7);               // +7 days (exclusive)
  return { start: start.getTime(), end: end.getTime() };
}
function isInRange(ts, range){
  return ts >= range.start && ts < range.end;
}
function getWeekTransactions(txns, range){
  return txns.filter(t => isInRange(t.ts, range));
}

/* =========================================================================
   COMPUTE
   ========================================================================= */
function computeTotals(weekTxns, allowance){
  const spent = weekTxns.reduce((s,t)=> s + (t.amount||0), 0);
  const remaining = allowance - spent;
  // pct of allowance spent; guard divide-by-zero when allowance===0
  const pct = allowance > 0 ? spent/allowance : 0;
  const isOver = allowance > 0 && spent > allowance;
  return { spent, allowance, remaining, pct, isOver };
}

function computeCategoryBreakdown(weekTxns, categories){
  const byId = {};
  let grand = 0;
  weekTxns.forEach(t=>{
    byId[t.categoryId] = (byId[t.categoryId]||0) + (t.amount||0);
    grand += (t.amount||0);
  });
  const catMap = {};
  categories.forEach(c=> catMap[c.id]=c);
  const rows = Object.keys(byId).map(id=>{
    const c = catMap[id];
    return {
      categoryId:id,
      name: c ? c.name : "Uncategorized",
      icon: c ? c.icon : "❔",
      color: c ? c.color : "#888888",
      total: byId[id],
      pct: grand>0 ? byId[id]/grand : 0
    };
  });
  rows.sort((a,b)=> b.total - a.total);
  return { rows, grand, top: rows.length ? rows[0] : null };
}

/* =========================================================================
   UTIL
   ========================================================================= */
function formatMoney(centavos, symbol){
  symbol = symbol || (STATE ? STATE.settings.currencySymbol : "₱");
  const neg = centavos < 0;
  const abs = Math.abs(Math.round(centavos));
  const pesos = Math.floor(abs/100);
  const cents = abs % 100;
  const pesoStr = pesos.toLocaleString("en-US");
  return (neg?"-":"") + symbol + pesoStr + "." + String(cents).padStart(2,"0");
}

/* Parse a raw amount string into integer centavos, or null if invalid. */
function parseAmountInput(str){
  if(str==null) return null;
  str = String(str).trim();
  if(str==="") return null;
  // valid: digits with optional single decimal point and up to many digits
  if(!/^\d*\.?\d*$/.test(str)) return null;
  if(str==="."||str==="") return null;
  // TRUNCATE (not round) to 2 decimals by working on the string, avoiding
  // float drift like 12.34*100. e.g. "12.999" -> 1299, "12.345" -> 1234.
  const parts = str.split(".");
  const intPart = parts[0] || "0";
  const decPart = (parts[1] || "").slice(0,2).padEnd(2,"0");  // first 2 dp, padded
  let centavos = parseInt(intPart,10) * 100 + parseInt(decPart,10);
  if(isNaN(centavos) || centavos <= 0) return null;
  if(centavos > MAX_CENTAVOS) centavos = MAX_CENTAVOS;   // clamp at cap
  return centavos;
}

function relativeTime(ts){
  const diff = Date.now() - ts;
  const s = Math.floor(diff/1000);
  if(s < 60) return "just now";
  const m = Math.floor(s/60);
  if(m < 60) return m+"m ago";
  const h = Math.floor(m/60);
  if(h < 24) return h+"h ago";
  const dd = Math.floor(h/24);
  if(dd < 7) return dd+"d ago";
  return new Date(ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});
}

function dayLabel(ts){
  const d = new Date(ts); d.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((today - d)/86400000);
  if(diffDays===0) return "Today";
  if(diffDays===1) return "Yesterday";
  return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",
    year: d.getFullYear()!==today.getFullYear() ? "numeric" : undefined});
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

/* =========================================================================
   MUTATIONS  (mutate in memory -> save -> render)
   ========================================================================= */
function addTransaction({amount, categoryId, note, ts}){
  STATE.transactions.push({
    id:newId(),
    amount:amount,
    categoryId:categoryId,
    note:(note||"").trim(),
    ts: ts==null ? Date.now() : ts
  });
  saveState();
  render();
}
function editTransaction(id, patch){
  const t = STATE.transactions.find(x=>x.id===id);
  if(!t) return;
  Object.assign(t, patch);
  saveState();
  render();
}
function deleteTransaction(id){
  STATE.transactions = STATE.transactions.filter(x=>x.id!==id);
  saveState();
  render();
}
function addCategory(name, color, icon){
  STATE.settings.categories.push({
    id:"c_"+newId(), name:name||"New", color:color||"#888888", icon:icon||"🏷️"
  });
  saveState(); render();
}
function editCategory(id, patch){
  const c = STATE.settings.categories.find(x=>x.id===id);
  if(!c) return;
  Object.assign(c, patch);
  saveState(); render();
}
/* Delete with guards: archive if referenced, block last, hard-delete if unused. */
function deleteCategory(id){
  const cats = STATE.settings.categories;
  const active = cats.filter(c=>!c.archived);
  if(active.length<=1){ showToast("Can't delete the last category."); return; }
  const used = STATE.transactions.some(t=>t.categoryId===id);
  if(used){
    const c = cats.find(x=>x.id===id);
    if(c){ c.archived=true; showToast("Category archived (kept for history)."); }
  }else{
    STATE.settings.categories = cats.filter(x=>x.id!==id);
    showToast("Category deleted.");
  }
  saveState(); render();
}
function updateSettings(patch){
  Object.assign(STATE.settings, patch);
  saveState(); render();
}

/* =========================================================================
   RENDER ROOT
   ========================================================================= */
let CURRENT_VIEW = "dash";

function render(){
  renderDashboard();
  renderAdd();
  renderHistory();
  renderSettings();
}

function switchView(name){
  CURRENT_VIEW = name;
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+name).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>
    t.classList.toggle("active", t.dataset.view===name));
  window.scrollTo(0,0);
}

/* =========================================================================
   RING (SVG)
   ========================================================================= */
function renderRing(pct, isOver){
  const R = 88, C = 2*Math.PI*R;
  const filled = Math.min(pct, 1);
  const offset = C * (1 - filled);
  let color = "var(--accent)";
  if(isOver || pct > 1) color = "var(--red)";
  else if(pct >= 0.8) color = "var(--amber)";
  const size = 2*(R+14);
  return `
  <div class="ring-holder">
    <svg class="ring-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${R}" fill="none" stroke-width="16"/>
      <circle class="ring-fg" cx="${size/2}" cy="${size/2}" r="${R}" fill="none" stroke-width="16"
        stroke="${color}" stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
    </svg>
    <div class="ring-center" id="ring-center"></div>
  </div>`;
}

/* =========================================================================
   DASHBOARD
   ========================================================================= */
function renderDashboard(){
  const el = document.getElementById("dash-body");
  const S = STATE.settings;
  const range = getCurrentWeekRange(Date.now(), S.weekStartDay);
  const wk = getWeekTransactions(STATE.transactions, range);
  const totals = computeTotals(wk, S.weeklyAllowance);

  // day-of-week label / reset hint
  const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
  const dayN = Math.floor((todayMidnight.getTime() - range.start)/86400000) + 1;
  const resetDate = new Date(range.end);
  const resetDayName = DAY_NAMES[resetDate.getDay()];

  // center text
  let centerBig, centerLbl;
  if(S.weeklyAllowance === 0){
    centerBig = formatMoney(totals.spent, S.currencySymbol);
    centerLbl = "spent";
  }else if(totals.isOver){
    centerBig = `<span style="color:var(--red)">-${formatMoney(Math.abs(totals.remaining), S.currencySymbol).replace('-','')}</span>`;
    centerLbl = "over budget";
  }else{
    centerBig = formatMoney(totals.remaining, S.currencySymbol);
    centerLbl = "left to spend";
  }

  // subline
  let sub;
  if(S.weeklyAllowance === 0){
    sub = `Spent ${formatMoney(totals.spent,S.currencySymbol)} · Day ${dayN} of week
      <span class="reset">Set a weekly allowance in Settings to track progress.</span>`;
  }else if(totals.isOver){
    sub = `Spent ${formatMoney(totals.spent,S.currencySymbol)} of ${formatMoney(totals.allowance,S.currencySymbol)} · Day ${dayN}
      <span class="reset">Over by ${formatMoney(Math.abs(totals.remaining),S.currencySymbol)} · resets ${resetDayName}</span>`;
  }else{
    sub = `Spent ${formatMoney(totals.spent,S.currencySymbol)} of ${formatMoney(totals.allowance,S.currencySymbol)} · Day ${dayN}
      <span class="reset">resets ${resetDayName}</span>`;
  }

  // breakdown
  const bd = computeCategoryBreakdown(wk, S.categories);
  let bdHtml;
  if(wk.length === 0){
    bdHtml = `<div class="empty"><span class="em">🌱</span>
      No spending yet this week.<br>Tap <b>Add</b> to log your first expense.</div>`;
  }else{
    const maxTotal = bd.rows[0].total || 1;
    bdHtml = `<div class="bd-top">Most spent: ${escapeHtml(bd.top.icon)} ${escapeHtml(bd.top.name)} · ${formatMoney(bd.top.total,S.currencySymbol)}</div>`;
    bdHtml += bd.rows.map(r=>{
      const w = Math.max(2, Math.round((r.total/maxTotal)*100));
      return `<div class="bar-row">
        <div class="bar-head">
          <span class="nm">${escapeHtml(r.icon)} ${escapeHtml(r.name)}</span>
          <span class="amt">${formatMoney(r.total,S.currencySymbol)} · ${Math.round(r.pct*100)}%</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${escapeHtml(r.color)}"></div></div>
      </div>`;
    }).join("");
  }

  el.innerHTML = `
    <div class="card ring-wrap">
      ${renderRing(totals.pct, totals.isOver)}
      <div class="subline">${sub}</div>
    </div>
    <div class="card">${bdHtml}</div>`;

  // inject ring center text (avoids nested template escaping issues)
  const rc = document.getElementById("ring-center");
  if(rc) rc.innerHTML = `<div class="big">${centerBig}</div><div class="lbl">${centerLbl}</div>`;
}

/* =========================================================================
   ADD  (keypad + chips)
   ========================================================================= */
let addAmountStr = "";        // raw string being typed e.g. "12.5"
let addCategoryId = null;
let addNote = "";

function renderAdd(){
  const el = document.getElementById("add-body");
  const S = STATE.settings;
  const cents = parseAmountInput(addAmountStr);
  const displayVal = cents!=null ? formatMoney(cents,S.currencySymbol)
                     : (addAmountStr ? S.currencySymbol+addAmountStr : S.currencySymbol+"0.00");
  const isZero = cents==null;
  const canSave = cents!=null && cents>0 && addCategoryId!=null;

  const chips = S.categories.filter(c=>!c.archived).map(c=>{
    const sel = c.id===addCategoryId;
    return `<button class="chip" aria-pressed="${sel}" data-cat="${c.id}"
      style="${sel?`background:${escapeHtml(c.color)}`:''}">${escapeHtml(c.icon)} ${escapeHtml(c.name)}</button>`;
  }).join("");

  el.innerHTML = `
    <div class="card" style="padding-bottom:14px">
      <div class="amount-display ${isZero?'zero':''}">${displayVal}</div>
      <div class="chips">${chips}</div>
      <input class="note-input" id="add-note" type="text" maxlength="60"
        placeholder="Note (optional)" value="${escapeHtml(addNote)}">
      <div class="keypad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" data-k="${n}">${n}</button>`).join("")}
        <button class="key fn" data-k=".">.</button>
        <button class="key" data-k="0">0</button>
        <button class="key fn" data-k="back">⌫</button>
      </div>
    </div>
    <div class="sticky-save">
      <button class="btn-primary" id="add-save" ${canSave?"":"disabled"}>Save Expense</button>
    </div>`;

  // wire chips
  el.querySelectorAll(".chip").forEach(b=>b.addEventListener("click",()=>{
    addCategoryId = (addCategoryId===b.dataset.cat) ? null : b.dataset.cat;
    renderAdd();
  }));
  // wire keypad
  el.querySelectorAll(".key").forEach(b=>b.addEventListener("click",()=>{
    pressKey(b.dataset.k);
  }));
  // note (preserve focus while typing)
  const noteEl = el.querySelector("#add-note");
  noteEl.addEventListener("input", e=>{ addNote = e.target.value; });
  // save
  el.querySelector("#add-save").addEventListener("click", saveAdd);
}

function pressKey(k){
  if(k==="back"){
    addAmountStr = addAmountStr.slice(0,-1);
  }else if(k==="."){
    if(!addAmountStr.includes(".")) addAmountStr += (addAmountStr===""?"0.":".");
  }else{
    // limit to 2 decimals
    if(addAmountStr.includes(".")){
      const dec = addAmountStr.split(".")[1];
      if(dec.length>=2) return;
    }
    // avoid absurdly long integers (cap guard handled in parse)
    if(addAmountStr.replace(".","").length>=11) return;
    addAmountStr += k;
  }
  renderAdd();
}

function saveAdd(){
  const cents = parseAmountInput(addAmountStr);
  if(cents==null || !addCategoryId) return;
  const cat = STATE.settings.categories.find(c=>c.id===addCategoryId);
  addTransaction({amount:cents, categoryId:addCategoryId, note:addNote});
  showToast(`Added ${formatMoney(cents)} to ${cat?cat.name:"category"}`);
  // reset form
  addAmountStr=""; addCategoryId=null; addNote="";
  switchView("dash");
  renderAdd();
}

/* =========================================================================
   HISTORY
   ========================================================================= */
function renderHistory(){
  const el = document.getElementById("history-body");
  const S = STATE.settings;
  const txns = STATE.transactions.slice().sort((a,b)=> b.ts - a.ts);

  if(txns.length===0){
    el.innerHTML = `<div class="card"><div class="empty">
      <span class="em">📭</span>No expenses yet.<br>
      <button class="btn-primary" style="max-width:200px;margin:14px auto 0" id="hist-cta">Add your first</button>
    </div></div>`;
    const cta = el.querySelector("#hist-cta");
    if(cta) cta.addEventListener("click",()=>switchView("add"));
    return;
  }

  const catMap = {};
  S.categories.forEach(c=>catMap[c.id]=c);

  let html = "";
  let lastLabel = null;
  txns.forEach(t=>{
    const lbl = dayLabel(t.ts);
    if(lbl!==lastLabel){ html += `<div class="day-head">${lbl}</div>`; lastLabel=lbl; }
    const c = catMap[t.categoryId];
    const icon = c ? c.icon : "❔";
    const name = c ? c.name : "Uncategorized";
    const nameStyle = c ? "" : "color:var(--text-dim)";
    const note = t.note ? `<div class="sub">${escapeHtml(t.note)}</div>` : "";
    html += `<button class="tx" data-id="${t.id}">
      <span class="tic">${escapeHtml(icon)}</span>
      <div class="mid"><div class="ttl" style="${nameStyle}">${escapeHtml(name)}</div>${note}</div>
      <div class="right"><div class="amt">${formatMoney(t.amount,S.currencySymbol)}</div>
        <div class="rt">${relativeTime(t.ts)}</div></div>
    </button>`;
  });
  el.innerHTML = html;
  el.querySelectorAll(".tx").forEach(b=>
    b.addEventListener("click",()=>openEditSheet(b.dataset.id)));
}

/* =========================================================================
   EDIT SHEET (bottom modal)
   ========================================================================= */
function openEditSheet(id){
  const t = STATE.transactions.find(x=>x.id===id);
  if(!t) return;
  const S = STATE.settings;
  const sheet = document.getElementById("sheet");
  // include archived cats so an archived one stays selectable here
  const chips = S.categories.map(c=>{
    const sel = c.id===t.categoryId;
    const arch = c.archived ? " (archived)" : "";
    return `<button class="chip" aria-pressed="${sel}" data-cat="${c.id}"
      style="${sel?`background:${escapeHtml(c.color)}`:''}">${escapeHtml(c.icon)} ${escapeHtml(c.name)}${arch}</button>`;
  }).join("");

  sheet.innerHTML = `
    <h3>Edit Expense</h3>
    <div class="field">
      <label>Amount (${escapeHtml(S.currencySymbol)})</label>
      <input id="ed-amt" type="text" inputmode="decimal" value="${(t.amount/100).toFixed(2)}">
    </div>
    <div class="field">
      <label>Category</label>
      <div class="chips" id="ed-chips">${chips}</div>
    </div>
    <div class="field">
      <label>Note</label>
      <input id="ed-note" type="text" maxlength="60" value="${escapeHtml(t.note||'')}">
    </div>
    <div class="row2">
      <button class="btn-sec btn-danger" id="ed-del">Delete</button>
      <button class="btn-primary" style="margin-top:0" id="ed-save">Save</button>
    </div>`;

  let selCat = t.categoryId;
  sheet.querySelectorAll(".chip").forEach(b=>b.addEventListener("click",()=>{
    selCat = b.dataset.cat;
    sheet.querySelectorAll(".chip").forEach(x=>{
      const on = x.dataset.cat===selCat;
      x.setAttribute("aria-pressed", on);
      const cc = S.categories.find(c=>c.id===x.dataset.cat);
      x.style.background = on && cc ? cc.color : "";
    });
  }));

  sheet.querySelector("#ed-save").addEventListener("click",()=>{
    const cents = parseAmountInput(sheet.querySelector("#ed-amt").value);
    if(cents==null){ showToast("Enter a valid amount."); return; }
    editTransaction(id,{
      amount:cents,
      categoryId:selCat,
      note:sheet.querySelector("#ed-note").value.trim()
    });
    closeSheet();
    showToast("Saved.");
  });
  sheet.querySelector("#ed-del").addEventListener("click",()=>{
    if(confirm("Delete this expense? This can't be undone.")){
      deleteTransaction(id);
      closeSheet();
      showToast("Deleted.");
    }
  });

  document.getElementById("sheet-overlay").classList.add("show");
}
function closeSheet(){
  document.getElementById("sheet-overlay").classList.remove("show");
}

/* =========================================================================
   SETTINGS
   ========================================================================= */
function renderSettings(){
  const el = document.getElementById("settings-body");
  const S = STATE.settings;
  const allowancePesos = (S.weeklyAllowance/100).toFixed(2);

  const activeCount = S.categories.filter(c=>!c.archived).length;

  const catRows = S.categories.map(c=>{
    if(c.archived){
      return `<div class="cat-manage" style="opacity:.6">
        <span class="ci">${escapeHtml(c.icon)}</span>
        <span class="cn" style="border:none;padding-left:0">${escapeHtml(c.name)} (archived)</span>
        <button class="del" data-restore="${c.id}" title="Restore" style="color:var(--accent)">↺</button>
      </div>`;
    }
    const sw = COLOR_PRESETS.map(col=>
      `<button class="sw" aria-pressed="${col.toLowerCase()===c.color.toLowerCase()}"
        style="background:${col}" data-cat="${c.id}" data-color="${col}"></button>`).join("");
    return `<div class="cat-manage">
        <span class="ci">${escapeHtml(c.icon)}</span>
        <input class="cn" data-cat="${c.id}" value="${escapeHtml(c.name)}" maxlength="20">
        <button class="del" data-del="${c.id}" title="Delete">🗑</button>
      </div>
      <div class="swatches">${sw}</div>`;
  }).join("");

  el.innerHTML = `
    <div class="card">
      <div class="field">
        <label>Weekly allowance (${escapeHtml(S.currencySymbol)})</label>
        <input id="set-allow" type="text" inputmode="decimal" value="${allowancePesos}">
      </div>
      <div class="field">
        <label>Currency symbol</label>
        <input id="set-sym" type="text" maxlength="3" value="${escapeHtml(S.currencySymbol)}">
      </div>
      <div class="field">
        <label>Week starts on</label>
        <select id="set-wsd">
          ${DAY_NAMES.map((d,i)=>`<option value="${i}" ${i===S.weekStartDay?"selected":""}>${d}</option>`).join("")}
        </select>
      </div>
      <button class="btn-primary" id="set-save" style="margin-top:4px">Save Settings</button>
    </div>

    <div class="card">
      <h3 style="margin-bottom:14px">Categories</h3>
      ${catRows}
      ${activeCount<=1?`<div class="arch-note">You need at least one category.</div>`:""}
      <button class="btn-sec" id="cat-add">+ Add category</button>
    </div>

    <div class="card">
      <h3 style="margin-bottom:14px">Data</h3>
      <button class="btn-sec" id="data-export">⬇ Export JSON</button>
      <button class="btn-sec" id="data-import">⬆ Import JSON</button>
      <input type="file" id="import-file" accept="application/json,.json" style="display:none">
      <button class="btn-sec btn-danger" id="data-clear" style="margin-top:14px">Clear all data</button>
    </div>
    <div class="hint">Weekly Budget · data stays on this device${STORAGE_OK?"":" · saving OFF"}</div>`;

  // ----- settings save -----
  el.querySelector("#set-save").addEventListener("click",()=>{
    const allow = parseAmountInput(el.querySelector("#set-allow").value);
    const allowVal = allow==null ? 0 : allow;   // allow 0 explicitly
    const symRaw = el.querySelector("#set-sym").value.trim() || "₱";
    const wsd = parseInt(el.querySelector("#set-wsd").value,10);
    updateSettings({weeklyAllowance:allowVal, currencySymbol:symRaw, weekStartDay:wsd});
    showToast("Settings saved.");
  });

  // ----- rename categories -----
  el.querySelectorAll("input.cn").forEach(inp=>
    inp.addEventListener("change",()=>{
      const v = inp.value.trim();
      if(v) editCategory(inp.dataset.cat,{name:v});
    }));
  // ----- recolor -----
  el.querySelectorAll(".sw").forEach(b=>
    b.addEventListener("click",()=>editCategory(b.dataset.cat,{color:b.dataset.color})));
  // ----- delete (guarded) -----
  el.querySelectorAll("[data-del]").forEach(b=>
    b.addEventListener("click",()=>{
      const id=b.dataset.del;
      const used = STATE.transactions.some(t=>t.categoryId===id);
      const msg = used ? "This category has expenses. Archive it (kept in history)?"
                       : "Delete this category?";
      if(confirm(msg)) deleteCategory(id);
    }));
  // ----- restore archived -----
  el.querySelectorAll("[data-restore]").forEach(b=>
    b.addEventListener("click",()=>editCategory(b.dataset.restore,{archived:false})));
  // ----- add category -----
  el.querySelector("#cat-add").addEventListener("click",()=>{
    const name = prompt("Category name?");
    if(name && name.trim()){
      const icon = prompt("An emoji icon? (optional)","🏷️") || "🏷️";
      addCategory(name.trim(), COLOR_PRESETS[STATE.settings.categories.length % COLOR_PRESETS.length], icon.trim()||"🏷️");
    }
  });

  // ----- export -----
  el.querySelector("#data-export").addEventListener("click", exportJSON);
  // ----- import -----
  const fileInp = el.querySelector("#import-file");
  el.querySelector("#data-import").addEventListener("click",()=>fileInp.click());
  fileInp.addEventListener("change", e=>importJSON(e.target.files[0]));
  // ----- clear (double confirm) -----
  el.querySelector("#data-clear").addEventListener("click",()=>{
    if(!confirm("Clear ALL data? This deletes every expense and resets settings.")) return;
    if(!confirm("Are you absolutely sure? This cannot be undone.")) return;
    STATE = defaultState();
    saveState();
    addAmountStr=""; addCategoryId=null; addNote="";
    render();
    switchView("dash");
    showToast("All data cleared.");
  });
}

/* =========================================================================
   EXPORT / IMPORT
   ========================================================================= */
function exportJSON(){
  try{
    const blob = new Blob([JSON.stringify(STATE,null,2)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0,10);
    a.href=url; a.download="budget-backup-"+stamp+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    showToast("Exported.");
  }catch(e){
    // fallback to data URI
    const uri = "data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(STATE,null,2));
    const a=document.createElement("a"); a.href=uri; a.download="budget-backup.json"; a.click();
  }
}
function importJSON(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      const migrated = migrate(parsed);
      if(!confirm("Import will REPLACE your current data. Continue?")) return;
      STATE = migrated;
      saveState();
      addAmountStr=""; addCategoryId=null; addNote="";
      render(); switchView("dash");
      showToast("Imported successfully.");
    }catch(e){
      showToast("Import failed — invalid file.");
    }
  };
  reader.onerror = ()=>showToast("Couldn't read file.");
  reader.readAsText(file);
}

/* =========================================================================
   TOAST
   ========================================================================= */
let toastTimer=null;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* =========================================================================
   INIT
   ========================================================================= */
function init(){
  STATE = loadState();
  STATE.meta.lastOpenedAt = Date.now();

  // offline / in-memory banner
  if(!STORAGE_OK){
    document.getElementById("banner").classList.add("show");
  }else{
    saveState();  // persist lastOpenedAt + seed first-run defaults
  }

  // tab wiring
  document.querySelectorAll(".tab").forEach(t=>
    t.addEventListener("click",()=>switchView(t.dataset.view)));

  // sheet overlay click-to-close (only on backdrop)
  document.getElementById("sheet-overlay").addEventListener("click", e=>{
    if(e.target.id==="sheet-overlay") closeSheet();
  });

  render();
  switchView("dash");

  // Optional, guarded service-worker attempt — only over http(s), never file://
  if("serviceWorker" in navigator &&
     (location.protocol==="https:" || location.protocol==="http:")){
    try{
      const swCode = "self.addEventListener('fetch',function(){});";
      const swUrl = URL.createObjectURL(new Blob([swCode],{type:"text/javascript"}));
      navigator.serviceWorker.register(swUrl).catch(()=>{});
    }catch(e){ /* silently ignore */ }
  }
}

document.addEventListener("DOMContentLoaded", init);
</script>
